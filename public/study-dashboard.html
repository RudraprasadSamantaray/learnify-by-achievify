<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Management - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/study.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header study-header">
            <div class="header-content">
                <h1>
                    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    Study Management
                </h1>
                <div class="header-actions">
                    <button class="btn-pdf-library" onclick="window.location.href='user-dashboard.html'">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        PDFs
                    </button>
                    <button class="btn-atrack-link" onclick="window.location.href='atrack-dashboard.html'">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        ATrack
                    </button>
                    <span class="user-badge" id="userInfo">Loading...</span>
                    <button class="btn-secondary" id="logoutBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main study-main">
            <!-- Dashboard Overview -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3 id="todayMinutes">0</h3>
                        <p>Minutes Today</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(239, 68, 68, 0.1);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3 id="pendingTasks">0</h3>
                        <p>Pending Tasks</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3 id="upcomingEvents">0</h3>
                        <p>Upcoming Events</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3 id="weekPomodoros">0</h3>
                        <p>Pomodoros This Week</p>
                    </div>
                </div>
            </div>

            <!-- Tab Navigation -->
            <div class="tabs study-tabs">
                <button class="tab-btn active" data-tab="pomodoro">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Pomodoro Timer
                </button>
                <button class="tab-btn" data-tab="tasks">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                    Tasks
                </button>
                <button class="tab-btn" data-tab="calendar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Calendar
                </button>
                <button class="tab-btn" data-tab="subjects">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    Subjects
                </button>
            </div>

            <!-- Pomodoro Tab -->
            <div class="tab-content active" id="pomodoroTab">
                <div class="pomodoro-container">
                    <div class="pomodoro-timer">
                        <div class="timer-circle">
                            <svg class="timer-svg" viewBox="0 0 200 200">
                                <circle class="timer-bg" cx="100" cy="100" r="90"></circle>
                                <circle class="timer-progress" id="timerProgress" cx="100" cy="100" r="90"></circle>
                            </svg>
                            <div class="timer-display">
                                <div class="timer-time" id="timerDisplay">25:00</div>
                                <div class="timer-label" id="timerLabel">Focus Time</div>
                            </div>
                        </div>
                        
                        <div class="timer-controls">
                            <button class="btn-timer btn-start" id="startTimer">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                                Start
                            </button>
                            <button class="btn-timer btn-pause" id="pauseTimer" style="display: none;">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <rect x="6" y="4" width="4" height="16"></rect>
                                    <rect x="14" y="4" width="4" height="16"></rect>
                                </svg>
                                Pause
                            </button>
                            <button class="btn-timer btn-reset" id="resetTimer">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="1 4 1 10 7 10"></polyline>
                                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                                </svg>
                                Reset
                            </button>
                        </div>

                        <div class="timer-settings">
                            <button class="timer-mode-btn active" data-duration="25" data-type="focus">
                                Focus (25min)
                            </button>
                            <button class="timer-mode-btn" data-duration="5" data-type="short_break">
                                Short Break (5min)
                            </button>
                            <button class="timer-mode-btn" data-duration="15" data-type="long_break">
                                Long Break (15min)
                            </button>
                        </div>

                        <div class="timer-context">
                            <select id="pomodoroSubject" class="form-select">
                                <option value="">Select Subject (Optional)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tasks Tab -->
            <div class="tab-content" id="tasksTab">
                <div class="section-card">
                    <h2>Add New Task</h2>
                    <form id="addTaskForm" class="task-form">
                        <div class="form-grid">
                            <input type="text" id="taskTitle" placeholder="Task title *" required>
                            <select id="taskSubject">
                                <option value="">No Subject</option>
                            </select>
                            <input type="date" id="taskDueDate">
                            <select id="taskPriority">
                                <option value="low">Low Priority</option>
                                <option value="medium" selected>Medium Priority</option>
                                <option value="high">High Priority</option>
                            </select>
                        </div>
                        <textarea id="taskDescription" placeholder="Description (optional)" rows="2"></textarea>
                        <button type="submit" class="btn-primary">Add Task</button>
                    </form>
                </div>

                <div class="section-card">
                    <div class="section-header-row">
                        <h2>My Tasks</h2>
                        <div class="task-filters">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="pending">Pending</button>
                            <button class="filter-btn" data-filter="in_progress">In Progress</button>
                            <button class="filter-btn" data-filter="completed">Completed</button>
                        </div>
                    </div>
                    <div id="tasksList" class="tasks-list">
                        <div class="loading-state">
                            <svg class="spinner" viewBox="0 0 24 24">
                                <circle class="spinner-circle" cx="12" cy="12" r="10"></circle>
                            </svg>
                            <p>Loading tasks...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Calendar Tab -->
            <div class="tab-content" id="calendarTab">
                <div class="section-card">
                    <h2>Add Event</h2>
                    <form id="addEventForm" class="event-form">
                        <div class="form-grid">
                            <input type="text" id="eventTitle" placeholder="Event title *" required>
                            <select id="eventSubject">
                                <option value="">No Subject</option>
                            </select>
                            <input type="date" id="eventDate" required>
                            <input type="time" id="eventTime">
                            <select id="eventType">
                                <option value="exam">Exam</option>
                                <option value="class">Class</option>
                                <option value="assignment">Assignment Due</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <textarea id="eventDescription" placeholder="Description (optional)" rows="2"></textarea>
                        <button type="submit" class="btn-primary">Add Event</button>
                    </form>
                </div>

                <div class="section-card">
                    <div class="section-header-row">
                        <h2>Calendar</h2>
                        <div class="month-navigator">
                            <button class="btn-icon" id="prevMonth">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <span id="currentMonth">January 2026</span>
                            <button class="btn-icon" id="nextMonth">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="calendarView" class="calendar-grid"></div>
                    <div id="eventsList" class="events-list"></div>
                </div>
            </div>

            <!-- Subjects Tab -->
            <div class="tab-content" id="subjectsTab">
                <div class="section-card">
                    <h2>Add Subject</h2>
                    <form id="addSubjectForm" class="subject-form">
                        <div class="form-row">
                            <input type="text" id="subjectName" placeholder="Subject name *" required>
                            <input type="color" id="subjectColor" value="#6366f1">
                            <button type="submit" class="btn-primary">Add Subject</button>
                        </div>
                    </form>
                </div>

                <div class="section-card">
                    <h2>My Subjects</h2>
                    <div id="subjectsList" class="subjects-grid">
                        <div class="loading-state">
                            <svg class="spinner" viewBox="0 0 24 24">
                                <circle class="spinner-circle" cx="12" cy="12" r="10"></circle>
                            </svg>
                            <p>Loading subjects...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/study.js"></script>
</body>
</html>
